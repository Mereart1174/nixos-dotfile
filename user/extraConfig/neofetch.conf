# See this wiki page for more info:
# https://github.com/dylanaraps/neofetch/wiki/Customizing-Info
print_info() {

    prin "$(color 1) пҶ’  $(color 2)  пҶ’  $(color 3)  пҶ’  $(color 4)  пҶ’  $(color 5)  пҶ’  $(color 6)  пҶ’  $(color 7)  пҶ’  $(color 8)  пҶ’  \n \n $(color 9) \n пҶ’  $(color 10)  пҶ’  $(color 11)  пҶ’  $(color 12)  пҶ’  $(color 13)  пҶ’  $(color 14)  пҶ’  $(color 15)  пҶ’  $(color 16)  пҶ’  "

    prin "$(color 1)в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҖпҶ’в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ"

    info "${c1}пҢғ OS" os
    info "${c1}в”Ӯ в”ңпҢғ " distro
    info "${c1}в”Ӯ в”ңоҳ• " kernel
    info "${c1}в”Ӯ в”ңпЈ– " packages
    info "${c1}в”Ӯ в””пҠ’ " shell

    prin"в”Ӯ"

    info "${c2}п’Ҳ DE/WM" de
    info "${c2}в”Ӯ в”ңп–Ә " theme
    info "${c2}в”Ӯ в”ңпҖұ " term_font
    info "${c2}в”Ӯ в””п’ү " term

    prin"в”Ӯ"

    info "${c3}п„ү PC" model
    info "${c3}в”Ӯ в”ңпЎҡ " cpu
    info "${c3}в”Ӯ в”ңпЎё " gpu
    info "${c3}в”Ӯ в”ңпӢӣ " memory
    info "${c3}в”Ӯ в”ңпҷҸ " uptime
    info "${c3}в”Ӯ в””пЎё " resolution
    prin "$(color 1)в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҖпҶ’в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ"

    prin "$(color 1) пҶ’  $(color 2)  пҶ’  $(color 3)  пҶ’  $(color 4)  пҶ’  $(color 5)  пҶ’  $(color 6)  пҶ’  $(color 7)  пҶ’  $(color 8)  пҶ’  \n \n $(color 9) \n пҶ’  $(color 10)  пҶ’  $(color 11)  пҶ’  $(color 12)  пҶ’  $(color 13)  пҶ’  $(color 14)  пҶ’  $(color 15)  пҶ’  $(color 16)  пҶ’  "
}

separator="=>"

# OS Architecture.
os_arch="off"

# Gtk Theme / Icons / Font
gtk_shorthand="on"
shell_version="off"

# CPU
cpu_cores="off"
speed_shorthand="on"

 # Resolution
refresh_rate="off"

image_source="$NIX_CONF_DIR/user/extraConfig/neofetch.logo"
